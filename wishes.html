<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aya's Wishes 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Pacifico&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --rose:#d94f72;--deep:#7a1535;--gold:#f0bc3c;
  --champagne:#fde8b8;--night:#0e0810;--mid:#1c0b18;
  --soft:#f5b8cc;--cream:#fef8f2;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--night);color:#fff;min-height:100vh;}

/* LOGIN */
#login{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#3c0c24,var(--night) 65%);
  padding:2rem;
}
.login-box{
  background:rgba(255,255,255,.04);border:1px solid rgba(217,79,114,.3);
  border-radius:24px;padding:3rem 2.5rem;max-width:400px;width:100%;
  text-align:center;backdrop-filter:blur(14px);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.login-box h1{
  font-family:'Pacifico',cursive;font-size:2rem;
  background:linear-gradient(130deg,var(--gold),var(--rose));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.5rem;padding-bottom:.05em;
}
.login-box p{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:rgba(249,192,208,.6);font-size:1rem;margin-bottom:2rem;
}
#pw-input{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid rgba(217,79,114,.3);border-radius:12px;
  color:#fff;font-family:'DM Sans',sans-serif;font-size:1rem;
  padding:1rem 1.2rem;outline:none;margin-bottom:1rem;
  transition:border-color .3s,box-shadow .3s;letter-spacing:3px;
  text-align:center;
}
#pw-input:focus{border-color:var(--gold);box-shadow:0 0 18px rgba(240,188,60,.18);}
#pw-input::placeholder{letter-spacing:1px;}
.login-btn{
  width:100%;background:linear-gradient(130deg,var(--rose),var(--gold));
  color:#fff;border:none;border-radius:12px;
  padding:1rem;font-family:'DM Sans',sans-serif;
  font-weight:600;font-size:1rem;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 18px rgba(217,79,114,.35);
}
.login-btn:hover{transform:scale(1.03);}
#login-err{
  color:#f87171;font-size:.85rem;margin-top:.8rem;
  opacity:0;transition:opacity .3s;
}
#login-err.show{opacity:1;}

/* DASHBOARD */
#dash{display:none;padding:2rem;max-width:900px;margin:0 auto;}
.dash-header{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:1rem;
  padding:1.5rem 0;border-bottom:1px solid rgba(217,79,114,.2);
  margin-bottom:2.5rem;
}
.dash-header h1{
  font-family:'Pacifico',cursive;font-size:1.8rem;
  background:linear-gradient(130deg,var(--gold),var(--rose));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  padding-bottom:.05em;
}
.dash-stats{
  display:flex;gap:1rem;flex-wrap:wrap;
}
.stat-pill{
  background:rgba(255,255,255,.05);border:1px solid rgba(217,79,114,.2);
  border-radius:50px;padding:.4rem 1rem;font-size:.85rem;color:var(--soft);
}
.stat-pill span{color:var(--gold);font-weight:600;}
.refresh-btn{
  background:rgba(255,255,255,.06);border:1px solid rgba(240,188,60,.3);
  color:var(--gold);border-radius:50px;padding:.5rem 1.2rem;
  font-size:.85rem;cursor:pointer;transition:all .2s;
}
.refresh-btn:hover{background:rgba(240,188,60,.1);}
.clear-btn{
  background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);
  color:#f87171;border-radius:50px;padding:.5rem 1.2rem;
  font-size:.85rem;cursor:pointer;transition:all .2s;
}
.clear-btn:hover{background:rgba(248,113,113,.15);}

/* wishes */
#wishes-container{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:1.2rem;
}
.wish-card{
  background:linear-gradient(150deg,rgba(28,11,24,.9),rgba(42,13,32,.9));
  border:1px solid rgba(217,79,114,.2);border-radius:18px;
  padding:1.5rem;position:relative;
  transition:border-color .3s,transform .3s;
}
.wish-card:hover{border-color:rgba(217,79,114,.4);transform:translateY(-2px);}
.wish-card .wc-num{
  font-family:'Pacifico',cursive;font-size:1rem;color:var(--gold);
  margin-bottom:.6rem;opacity:.7;
}
.wish-card .wc-text{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.1rem;color:var(--champagne);line-height:1.75;
  margin-bottom:1rem;
}
.wish-card .wc-date{
  font-size:.72rem;color:rgba(249,192,208,.4);letter-spacing:1px;
}
.wish-card .wc-del{
  position:absolute;top:.8rem;right:.8rem;
  background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);
  color:#f87171;border-radius:50%;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;cursor:pointer;transition:all .2s;opacity:0;
}
.wish-card:hover .wc-del{opacity:1;}
.wish-card .wc-del:hover{background:rgba(248,113,113,.25);}

/* empty state */
.empty-state{
  grid-column:1/-1;text-align:center;padding:4rem 2rem;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.2rem;color:rgba(249,192,208,.4);
}
.empty-state .es-icon{font-size:3rem;display:block;margin-bottom:1rem;}

/* loading */
#loading{
  text-align:center;padding:4rem;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:rgba(249,192,208,.5);font-size:1.1rem;
}
.loader{
  width:36px;height:36px;border:3px solid rgba(217,79,114,.2);
  border-top-color:var(--rose);border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 1rem;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* logout */
.logout-btn{
  background:transparent;border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.35);border-radius:50px;padding:.5rem 1.2rem;
  font-size:.85rem;cursor:pointer;transition:all .2s;
}
.logout-btn:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.55);}

/* confirm dialog */
#confirm-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);z-index:1000;
  align-items:center;justify-content:center;
}
#confirm-overlay.open{display:flex;}
.confirm-box{
  background:linear-gradient(150deg,#1c0515,#2a0d20);
  border:1px solid rgba(248,113,113,.3);border-radius:20px;
  padding:2rem;max-width:360px;width:90%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.confirm-box p{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--champagne);margin-bottom:1.5rem;line-height:1.6;}
.confirm-btns{display:flex;gap:.8rem;justify-content:center;}
.conf-yes{background:#ef4444;color:#fff;border:none;border-radius:8px;padding:.7rem 1.5rem;cursor:pointer;font-weight:600;transition:background .2s;}
.conf-yes:hover{background:#dc2626;}
.conf-no{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:.7rem 1.5rem;cursor:pointer;transition:all .2s;}
.conf-no:hover{background:rgba(255,255,255,.14);}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login">
  <div class="login-box">
    <h1>Aya's Wishes 💌</h1>
    <p>Private dashboard — enter your password to see her wishes</p>
    <input type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()"/>
    <button class="login-btn" onclick="checkPw()">Enter 🌹</button>
    <p id="login-err">Wrong password. Try again.</p>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dash">
  <div class="dash-header">
    <h1>Aya's Wishes 💌</h1>
    <div class="dash-stats">
      <div class="stat-pill">Total: <span id="total-count">0</span> wishes</div>
    </div>
    <div style="display:flex;gap:.6rem;flex-wrap:wrap;">
      <button class="refresh-btn" onclick="loadWishes()">🔄 Refresh</button>
      <button class="clear-btn" onclick="confirmClearAll()">🗑️ Clear All</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div id="loading"><div class="loader"></div>Loading wishes...</div>
  <div id="wishes-container" style="display:none;"></div>
</div>

<!-- Confirm dialog -->
<div id="confirm-overlay">
  <div class="confirm-box">
    <p id="confirm-msg">Are you sure you want to delete this wish?</p>
    <div class="confirm-btns">
      <button class="conf-yes" id="conf-yes-btn">Yes, delete</button>
      <button class="conf-no" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════
   CONFIG — same as index.html
════════════════════════════════════ */
const BIN_KEY  = 'YOUR_MASTER_KEY'; // ← same jsonbin.io Master Key
const BIN_ID   = 'YOUR_BIN_ID';    // ← same jsonbin.io Bin ID
const PASSWORD = 'tweeta2026';      // ← change this to your own password!

/* ── AUTH ─────────────────────────── */
function checkPw(){
  const val=document.getElementById('pw-input').value;
  if(val===PASSWORD){
    sessionStorage.setItem('aya_auth','1');
    document.getElementById('login').style.display='none';
    document.getElementById('dash').style.display='block';
    loadWishes();
  } else {
    const err=document.getElementById('login-err');
    err.classList.add('show');
    document.getElementById('pw-input').value='';
    setTimeout(()=>err.classList.remove('show'),2500);
  }
}
function logout(){
  sessionStorage.removeItem('aya_auth');
  location.reload();
}
// auto-login if session exists
if(sessionStorage.getItem('aya_auth')==='1'){
  document.getElementById('login').style.display='none';
  document.getElementById('dash').style.display='block';
  loadWishes();
}

/* ── LOAD WISHES ──────────────────── */
let allWishes=[];
async function loadWishes(){
  document.getElementById('loading').style.display='block';
  document.getElementById('wishes-container').style.display='none';
  try{
    const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
      headers:{'X-Master-Key':BIN_KEY,'X-Bin-Meta':'false'}
    });
    const data=await res.json();
    allWishes=[...(data.wishes||[])].reverse(); // newest first
    renderWishes();
  }catch(e){
    document.getElementById('loading').innerHTML='<p style="color:#f87171">Could not load wishes. Check your BIN_KEY and BIN_ID.</p>';
  }
}

function renderWishes(){
  document.getElementById('loading').style.display='none';
  const container=document.getElementById('wishes-container');
  container.style.display='grid';
  document.getElementById('total-count').textContent=allWishes.length;
  if(allWishes.length===0){
    container.innerHTML='<div class="empty-state"><span class="es-icon">💭</span>No wishes yet — she hasn\'t made one yet. Check back on April 28!</div>';
    return;
  }
  container.innerHTML=allWishes.map((w,i)=>`
    <div class="wish-card">
      <div class="wc-num">Wish #${allWishes.length-i}</div>
      <div class="wc-text">"${w.text}"</div>
      <div class="wc-date">📅 ${w.date||'Unknown date'}</div>
      <button class="wc-del" onclick="confirmDelete(${allWishes.length-1-i})" title="Delete">✕</button>
    </div>
  `).join('');
}

/* ── DELETE ───────────────────────── */
let pendingDeleteIdx=null;
function confirmDelete(idx){
  pendingDeleteIdx=idx;
  document.getElementById('confirm-msg').textContent='Delete this wish? This cannot be undone.';
  document.getElementById('conf-yes-btn').onclick=()=>deleteWish(idx);
  document.getElementById('confirm-overlay').classList.add('open');
}
function confirmClearAll(){
  document.getElementById('confirm-msg').textContent='Delete ALL wishes? This cannot be undone.';
  document.getElementById('conf-yes-btn').onclick=clearAll;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');}

async function deleteWish(idx){
  closeConfirm();
  // allWishes is reversed, so real index = total - 1 - idx... let's just work with original array
  const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':BIN_KEY,'X-Bin-Meta':'false'}});
  const data=await res.json();
  const wishes=[...(data.wishes||[])];
  wishes.splice(idx,1);
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},
    body:JSON.stringify({wishes})
  });
  loadWishes();
}

async function clearAll(){
  closeConfirm();
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},
    body:JSON.stringify({wishes:[]})
  });
  loadWishes();
}
</script>
</body>
</html>
